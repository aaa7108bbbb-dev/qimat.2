<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مؤسسة قمة الفرصة التجارية</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 480px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      backdrop-filter: blur(12px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      text-align: center;
    }

    p {
      margin: 0 0 22px;
      text-align: center;
      color: rgba(255,255,255,0.8);
      line-height: 1.8;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      cursor: pointer;
      background: linear-gradient(90deg, #2563eb, #7c3aed);
    }

    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      text-align: center;
      display: none;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.35);
    }

    .note {
      margin-top: 18px;
      text-align: center;
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>مؤسسة قمة الفرصة التجارية</h1>
    <p>نظام بسيط كبداية، ويمكن تطويره لاحقًا إلى لوحة إدارة كاملة.</p>

    <button onclick="login()">تسجيل الدخول</button>

    <div class="result" id="result">تم تسجيل الدخول بنجاح</div>

    <div class="note">هذا ملف بداية، وليس النظام الكامل بعد.</div>
  </div>

  <script>
    function login() {
      const result = document.getElementById('result');
      result.style.display = 'block';
    }
  </script>
</body>
</html>
